name: AI News Pipeline

on:
  schedule:
    - cron: '0 11 * * *'   # 6am EST / 11am UTC — finance morning briefing
    - cron: '0 23 * * *'   # 6pm EST / 11pm UTC — tech evening briefing
  workflow_dispatch:
    inputs:
      category:
        description: 'Category to run (finance, tech, or both)'
        required: false
        default: 'both'

jobs:
  finance-pipeline:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.category == 'finance' || github.event.inputs.category == 'both') || github.event.schedule == '0 11 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache HuggingFace model (faster-whisper tiny.en)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-faster-whisper-tiny-en-v1

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run finance pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python -m pipeline.run finance

  tech-pipeline:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.category == 'tech' || github.event.inputs.category == 'both') || github.event.schedule == '0 23 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache HuggingFace model (faster-whisper tiny.en)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-faster-whisper-tiny-en-v1

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tech pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python -m pipeline.run tech
